<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="culturama-favico.png" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Pesquisa Culturama</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <header>
        <img src="img/logo-culturama.png" alt="logo culturama" />
        <h1>Pesquisa Online</h1>
      </header>

      <section>
        <form action="" method="get">
          <fieldset>
            <legend>Dados pessoais</legend>

            <label for="name">Nome</label>
            <input id="name" type="text" name="userName" required />
            <br />
            <label for="age">Idade</label>
            <input
              id="age"
              type="number"
              name="userAge"
              min="12"
              max="100"
              required
            />
            <br />
            <label for="birthDate">Data de nascimento</label>
            <input id="birthDate" type="date" name="userBirthDate" />
            <br />
            <label for="email">Email</label>
            <input id="email" type="email" name="userEmail" required />
            <br />
            <label for="phoneNumber">Telefone</label>
            <input
              id="phoneNumber"
              type="tel"
              name="userPhoneNumber"
              pattern="[0-9]{11}"
              placeholder="DDD + número sem espaços ou hifen"
            />
            <br />
            <label for="image">Upload de foto</label>
            <input id="image" type="file" accept="image/*" name="userImage" />
            <br />
          </fieldset>

          <fieldset>
            <legend>Perfil</legend>

            <p>Gênero:</p>
            <input id="fem" type="radio" name="userGender" value="female" />
            <label for="fem">Feminino</label>

            <input id="mal" type="radio" name="userGender" value="male" />
            <label for="mal">Masculino</label>

            <input
              id="notInformed"
              type="radio"
              name="userGender"
              value="notInformed"
            />
            <label for="notInformed">Prefiro não informar</label>

            <br />

            <label for="maritalStatus">Estado civil:</label>
            <select id="maritalStatus" name="userMaritalStatus">
              <option value="notInformed">Selecione...</option>
              <option value="married">Casado(a)</option>
              <option value="single">Solteiro(a)</option>
              <option value="divorced">Divorciado(a)</option>
              <option value="stableUnion">União estável</option>
            </select>

            <label for="state">Estado:</label>
            <select id="state" name="userState" required>
              <option value="AC">Acre</option>
              <option value="AL">Alagoas</option>
              <option value="AP">Amapá</option>
              <option value="AM">Amazonas</option>
              <option value="BA">Bahia</option>
              <option value="CE">Ceará</option>
              <option value="DF">Distrito Federal</option>
              <option value="ES">Espirito Santo</option>
              <option value="GO">Goiás</option>
              <option value="MA">Maranhão</option>
              <option value="MS">Mato Grosso do Sul</option>
              <option value="MT">Mato Grosso</option>
              <option value="MG">Minas Gerais</option>
              <option value="PA">Pará</option>
              <option value="PB">Paraíba</option>
              <option value="PR">Paraná</option>
              <option value="PE">Pernambuco</option>
              <option value="PI">Piauí</option>
              <option value="RJ">Rio de Janeiro</option>
              <option value="RN">Rio Grande do Norte</option>
              <option value="RS">Rio Grande do Sul</option>
              <option value="RO">Rondônia</option>
              <option value="RR">Roraima</option>
              <option value="SC">Santa Catarina</option>
              <option value="SP">São Paulo</option>
              <option value="SE">Sergipe</option>
              <option value="TO">Tocantins</option>
            </select>

            <label for="city">Cidade:</label>
            <input
              type="text"
              id="city"
              name="userCity"
              autocomplete="address-level2"
              placeholder="Ex.: São Paulo"
            />
          </fieldset>

          <fieldset>
            <legend>Hábitos</legend>

            <p>Redes sociais</p>

            <input
              id="instagram"
              type="checkbox"
              name="social"
              value="instagram"
            />
            <label for="instagram">Instagram</label>
            <br />
            <input
              id="facebook"
              type="checkbox"
              name="social"
              value="facebook"
            />
            <label for="facebook">Facebook</label>
            <br />
            <input
              id="linkedin"
              type="checkbox"
              name="social"
              value="linkedin"
            />
            <label for="linkedin">LinkedIn</label>
            <br />
            <input id="x" type="checkbox" name="social" value="x" />
            <label for="x">X</label>
            <br />

            <label for="musicStyle">Estilo musical:</label>
            <input
              id="musicStyle"
              list="styleTypes"
              name="userMusicStyle"
              type="text"
            />
            <datalist id="styleTypes">
              <option value="Rock"></option>
              <option value="Pop"></option>
              <option value="Samba"></option>
              <option value="Sertanejo"></option>
              <option value="Eletrônica"></option>
            </datalist>
            <br />
            <label for="favoriteColor">Cor favorita:</label>
            <input type="color" name="userFavoriteColor" id="favoriteColor" />
          </fieldset>

          <fieldset>
            <legend>Opinião</legend>

            <p>O que você acha da qualidade do nosso serviço?</p>
            <input id="great" type="radio" name="userRate" value="great" />
            <label for="great">Ótima</label>
            <input id="good" type="radio" name="userRate" value="good" />
            <label for="good">Boa</label>
            <input id="regular" type="radio" name="userRate" value="regular" />
            <label for="regular">Regular</label>
            <input id="bad" type="radio" name="userRate" value="bad" />
            <label for="bad">Ruim</label>

            <br />
            <p>Escreva sua opinião:</p>
            <textarea
              name="userComment"
              id="comment"
              placeholder="Escreva seu comentário..."
            ></textarea>
          </fieldset>

          <fieldset>
            <legend>Confirmações</legend>

            <input
              type="checkbox"
              name="userLGPD"
              id="userLGPDTerm"
              value="accept"
              required
            />
            <label for="userLGPDTerm">Eu aceito participar da pesquisa.</label>

            <br />

            <input
              type="checkbox"
              name="userGetResult"
              id="getResult"
              value="accept"
            />
            <label for="getResult">Desejo receber o resultado por email.</label>
          </fieldset>
          <button type="submit">Enviar</button>
          <button type="reset">Limpar</button>
        </form>
      </section>
    </main>
  </body>
</html>
